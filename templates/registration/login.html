{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container auth-shell">
  <div class="auth-hero"><div><h1 class="auth-title">Welcome Back</h1><p class="auth-sub">Log in to continue your Pokémon collection journey.</p></div><div class="auth-avatar">🔑</div></div>
  <div class="auth-card">
    <form method="post">{% csrf_token %}
      {% if form.non_field_errors %}<p class="auth-note" style="color:#ef4444;">{{ form.non_field_errors|striptags }}</p>{% endif %}
      <div class="auth-field"><label class="auth-label" for="id_username">👤 Username</label><input class="auth-input" type="text" name="username" id="id_username" required value="{{ form.username.value|default:'' }}"></div>
      <div class="auth-field"><label class="auth-label" for="id_password">🔒 Password</label><input class="auth-input" type="password" name="password" id="id_password" required></div>
      <div class="auth-actions"><button class="btn btn-primary" type="submit">Sign in</button><a class="btn btn-secondary" href="{% url 'cards:signup' %}">Create account</a></div>
    </form>
  </div>
</div>
{% endblock %}
