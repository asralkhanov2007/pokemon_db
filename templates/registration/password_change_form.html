{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="container auth-shell">
  <div class="auth-hero"><div><h1 class="auth-title">Security Update</h1><p class="auth-sub">Change your password to keep your trainer account safe.</p></div><div class="auth-avatar">🛡️</div></div>
  <div class="auth-card">
    <form method="post">{% csrf_token %}
      {% if form.non_field_errors %}<p class="auth-note" style="color:#ef4444;">{{ form.non_field_errors|striptags }}</p>{% endif %}
      <div class="auth-field"><label class="auth-label" for="id_old_password">Current password</label><input class="auth-input" type="password" name="old_password" required id="id_old_password"></div>
      <div class="auth-field"><label class="auth-label" for="id_new_password1">New password</label><input class="auth-input" type="password" name="new_password1" required id="id_new_password1"></div>
      <div class="auth-field"><label class="auth-label" for="id_new_password2">Confirm new password</label><input class="auth-input" type="password" name="new_password2" required id="id_new_password2"></div>
      <div class="auth-actions"><button class="btn btn-primary" type="submit">✅ Update password</button></div>
    </form>
  </div>
</div>
{% endblock %}
